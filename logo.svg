<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="inkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a5248"/>
      <stop offset="100%" stop-color="#3a3630"/>
    </linearGradient>
  </defs>

  <!-- Sharp frame — no rounded corners -->
  <rect x="3" y="3" width="114" height="114" stroke="currentColor" stroke-width="2" opacity="0.12"/>

  <!-- 雨: Top horizontal stroke (天) -->
  <line x1="22" y1="28" x2="98" y2="28" stroke="url(#inkGrad)" stroke-width="5" stroke-linecap="square"/>

  <!-- Central vertical stroke — stylized raindrop -->
  <path d="M60 36 L42 62 L60 86 L78 62 Z" fill="url(#inkGrad)" opacity="0.88"/>

  <!-- Inner water line -->
  <line x1="60" y1="52" x2="60" y2="72" stroke="#fff" stroke-width="1.5" opacity="0.35"/>

  <!-- Rain dots — square dots, no round corners -->
  <rect x="30" y="65" width="6" height="6" fill="url(#inkGrad)" opacity="0.55"/>
  <rect x="84" y="65" width="6" height="6" fill="url(#inkGrad)" opacity="0.55"/>
  <rect x="42" y="82" width="5" height="5" fill="url(#inkGrad)" opacity="0.4"/>
  <rect x="73" y="82" width="5" height="5" fill="url(#inkGrad)" opacity="0.4"/>

  <!-- Bottom accent dots -->
  <rect x="26" y="94" width="3" height="3" fill="url(#inkGrad)" opacity="0.25"/>
  <rect x="91" y="94" width="3" height="3" fill="url(#inkGrad)" opacity="0.25"/>
  <rect x="57" y="100" width="6" height="2" fill="url(#inkGrad)" opacity="0.2"/>
</svg>
