<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <defs>
    <linearGradient id="inkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a5248"/>
      <stop offset="100%" stop-color="#3a3630"/>
    </linearGradient>
  </defs>

  <!-- Sharp outer frame -->
  <rect x="4" y="4" width="172" height="172" fill="currentColor" opacity="0.03"/>
  <rect x="4" y="4" width="172" height="172" stroke="currentColor" stroke-width="2" opacity="0.12"/>

  <!-- 雨: Top horizontal -->
  <line x1="28" y1="44" x2="152" y2="44" stroke="url(#inkGrad)" stroke-width="7" stroke-linecap="square"/>

  <!-- Rain body — angular diamond -->
  <path d="M90 54 L60 95 L90 130 L120 95 Z" fill="url(#inkGrad)" opacity="0.88"/>

  <!-- Inner highlight stroke -->
  <line x1="90" y1="70" x2="90" y2="108" stroke="#fff" stroke-width="2" opacity="0.3"/>

  <!-- Square rain drops -->
  <rect x="46" y="98" width="9" height="9" fill="url(#inkGrad)" opacity="0.55"/>
  <rect x="125" y="98" width="9" height="9" fill="url(#inkGrad)" opacity="0.55"/>
  <rect x="64" y="124" width="7" height="7" fill="url(#inkGrad)" opacity="0.4"/>
  <rect x="109" y="124" width="7" height="7" fill="url(#inkGrad)" opacity="0.4"/>

  <!-- Bottom accent -->
  <rect x="40" y="142" width="5" height="5" fill="url(#inkGrad)" opacity="0.25"/>
  <rect x="135" y="142" width="5" height="5" fill="url(#inkGrad)" opacity="0.25"/>
  <rect x="85" y="152" width="10" height="3" fill="url(#inkGrad)" opacity="0.2"/>
</svg>
